<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor TransMilenio Bogotá</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet-minimap/3.6.1/Control.MiniMap.min.css"/>
    <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
 
<!-- TOPBAR -->
<div id="topbar">
    <div id="titulo">
        🚍 Visor <span>TransMilenio</span> Bogotá
    </div>
    <div id="auth-area">
        <span id="usuario-info"></span>
        <button id="btn-login-modal" onclick="abrirModal('modal-login')">Iniciar sesión</button>
        <button id="btn-registro-modal" onclick="abrirModal('modal-registro')">Registrarse</button>
        <button id="btn-logout" onclick="logout()" style="display:none">Cerrar sesión</button>
    </div>
</div>
 
<!-- PANEL -->
<div id="panel">
 
    <!-- CAPAS -->
    <div class="panel-section">
        <div class="section-label">Capas</div>
        <label class="layer-item">
            <input type="checkbox" id="chk-estaciones" checked>
            <span class="layer-dot" style="background:#C8102E"></span>
            Estaciones TM
        </label>
        <label class="layer-item">
            <input type="checkbox" id="chk-vias" checked>
            <span class="layer-dot" style="background:#2563EB; border-radius:2px; width:14px; height:4px;"></span>
            Vías (WMS)
        </label>
        <label class="layer-item">
            <input type="checkbox" id="chk-satelital">
            <span class="layer-dot" style="background:#6B7280; border-radius:2px; width:14px; height:4px;"></span>
            Vista satelital
        </label>
    </div>
 
    <!-- BÚSQUEDA -->
    <div class="panel-section">
        <div class="section-label">Buscar estación</div>
        <div class="search-wrap">
            <input type="text" id="input-busqueda" placeholder="Ej: Avenida Caracas...">
            <button onclick="buscarEstacion()">🔍</button>
        </div>
        <div id="resultados-busqueda"></div>
    </div>
 
    <!-- CALCULAR RUTA -->
    <div class="panel-section">
        <div class="section-label">Calcular ruta</div>
 
        <div class="ruta-puntos">
            <div class="ruta-punto" id="punto-origen">
                <div class="punto-badge origen">1</div>
                <span class="punto-nombre" id="nombre-origen">Selecciona origen</span>
            </div>
            <div class="ruta-punto" id="punto-destino">
                <div class="punto-badge destino">2</div>
                <span class="punto-nombre" id="nombre-destino">Selecciona destino</span>
            </div>
        </div>
 
        <div id="ruta-resultado">
            <div class="distancia-grande" id="dist-valor">— <span class="distancia-unit">m</span></div>
            <div class="resultado-row">
                <span class="label">Desde</span>
                <span class="valor" id="res-origen">—</span>
            </div>
            <div class="resultado-row">
                <span class="label">Hasta</span>
                <span class="valor" id="res-destino">—</span>
            </div>
        </div>
 
        <button class="btn-tm btn-ghost" onclick="limpiarRuta()">✕ Limpiar ruta</button>
        <p style="font-size:11px; color:#aaa; margin-top:6px; text-align:center">
            Haz clic en dos estaciones del mapa
        </p>
    </div>
 
    <!-- BUFFER -->
    <div class="panel-section">
        <div class="section-label">Análisis espacial</div>
        <div class="buffer-radio-wrap">
            <label>Radio</label>
            <input type="number" id="radio-buffer" value="500" min="50" max="5000" step="50">
            <span>metros</span>
        </div>
        <button class="btn-tm btn-primary" id="btn-buffer" onclick="toggleBuffer()">
            📍 Activar buffer
        </button>
        <button class="btn-tm btn-ghost" onclick="limpiarBuffer()" style="margin-top:4px">
            ✕ Limpiar buffer
        </button>
    </div>
 
</div>
 
<!-- MAPA -->
<div id="map"></div>
 
<!-- LEYENDA -->
<div id="leyenda">
    <b>Leyenda</b>
    <div class="ley-item"><span class="ley-dot" style="background:#C8102E"></span> Estaciones TM</div>
    <div class="ley-item"><span class="ley-line" style="background:#2563EB"></span> Vías</div>
    <div class="ley-item"><span class="ley-line" style="background:#2DC653"></span> Ruta calculada</div>
    <div class="ley-item"><span class="ley-dot" style="background:#2DC65355; border:2px solid #2DC653; width:12px; height:12px;"></span> Buffer</div>
</div>
 
<!-- MODAL LOGIN -->
<div id="modal-login" class="modal">
    <div class="modal-content">
        <h3>Iniciar sesión</h3>
        <input type="email" id="login-email" placeholder="Correo electrónico">
        <input type="password" id="login-password" placeholder="Contraseña">
        <div class="modal-btns">
            <button class="btn-tm btn-primary" onclick="login()">Entrar</button>
            <button class="btn-tm btn-ghost" onclick="cerrarModal('modal-login')">Cancelar</button>
        </div>
        <p class="modal-msg" id="login-error"></p>
    </div>
</div>
 
<!-- MODAL REGISTRO -->
<div id="modal-registro" class="modal">
    <div class="modal-content">
        <h3>Crear cuenta</h3>
        <input type="text"     id="reg-nombre"   placeholder="Nombre completo">
        <input type="email"    id="reg-email"    placeholder="Correo electrónico">
        <input type="password" id="reg-password" placeholder="Contraseña">
        <div class="modal-btns">
            <button class="btn-tm btn-primary" onclick="registro()">Registrarse</button>
            <button class="btn-tm btn-ghost" onclick="cerrarModal('modal-registro')">Cancelar</button>
        </div>
        <p class="modal-msg" id="reg-msg"></p>
    </div>
</div>
 
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-minimap/3.6.1/Control.MiniMap.min.js"></script>
<script src="js/map.js"></script>
<script src="js/auth.js"></script>
<script src="js/rutas.js"></script>
<script src="js/reportes.js"></script>
</body>
</html>
